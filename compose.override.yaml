# Development overrides - Expose ports for local access
services:
###> doctrine/doctrine-bundle ###
  database:
    ports:
      - "5435:5432"
###< doctrine/doctrine-bundle ###

###> symfony/mailer ###
  mailer:
    # Mailpit UI for viewing emails during development
    # Access at http://localhost:8026
###< symfony/mailer ###

###> Development PHP settings ###
  php:
    environment:
      - APP_ENV=dev
      - APP_DEBUG=1
###< Development PHP settings ###
